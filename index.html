<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OdontoPersonal — controle financeiro</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0E6E68" />

    <!-- iOS: faz o app abrir em tela cheia quando adicionado à Tela de Início -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OdontoPersonal" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; overflow-x: hidden; }

      @media (max-width: 820px) {
        .app-shell { flex-direction: column !important; }
        .app-sidebar {
          width: 100% !important;
          flex-direction: row !important;
          flex-wrap: wrap !important;
          align-items: center !important;
          justify-content: space-between !important;
          padding: 10px 14px !important;
          gap: 10px !important;
          border-right: none !important;
        }
        .app-sidebar-brand { flex: 1 1 auto; }
        .app-sidebar-smile { display: none !important; }
        .app-sidebar-nav {
          flex-direction: row !important;
          gap: 4px !important;
          overflow-x: auto;
          flex: 1 1 100%;
        }
        .app-sidebar-nav button { flex-shrink: 0; padding: 8px 10px !important; }
        .app-sidebar-nav .nav-label { display: none; }
        .app-sidebar-bottom {
          margin-top: 0 !important;
          flex-direction: row !important;
          flex: 1 1 100%;
          justify-content: space-between !important;
        }
        .app-main { padding: 16px !important; }
      }
    </style>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
